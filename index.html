<!DOCTYPE html>
<html>
<head>
  <title>Football Coach AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .hero {
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      padding: 18px;
      border-radius: 14px;
      text-align: center;
      margin-bottom: 15px;
    }

    .card {
      background: #111827;
      padding: 15px;
      border-radius: 14px;
      margin-top: 12px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 10px;
      border: none;
      background: #1f2937;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      font-weight: bold;
      margin-top: 10px;
    }

    .title {
      font-weight: bold;
      color: #93c5fd;
      margin-top: 10px;
    }

    .text {
      font-size: 14px;
      margin-top: 5px;
      white-space: pre-line;
    }

    .bad { color: #fca5a5; }
    .good { color: #86efac; }
  </style>
</head>

<body>

<div class="app">

  <div class="hero">
    <h2>⚽ Football Coach AI</h2>
    <p>Improve your skills step by step</p>
  </div>

  <div class="card">
    <input id="name" placeholder="Player Name">
    <input id="d" placeholder="Dribbling (1-10)">
    <input id="s" placeholder="Shooting (1-10)">
    <input id="p" placeholder="Passing (1-10)">
    <input id="sp" placeholder="Speed (1-10)">

    <button onclick="analyze()">Get Training Plan</button>
  </div>

  <div class="card" id="out" style="display:none;">

    <div class="title">Weak Areas</div>
    <div class="text bad" id="weak"></div>

    <div class="title">Training Plan</div>
    <div class="text good" id="plan"></div>

    <div class="title">Coach Message</div>
    <div class="text" id="msg"></div>

  </div>

</div>

<script>
function analyze(){
  let name = document.getElementById("name").value;
  let d = +document.getElementById("d").value;
  let s = +document.getElementById("s").value;
  let p = +document.getElementById("p").value;
  let sp = +document.getElementById("sp").value;

  let weak = [];

  if(d <= 5) weak.push("Dribbling");
  if(s <= 5) weak.push("Shooting");
  if(p <= 5) weak.push("Passing");
  if(sp <= 5) weak.push("Speed");

  let plan = "";

  if(weak.includes("Shooting")) plan += "Day 1: Shooting drills\nDay 2: Finishing under pressure\n\n";
  if(weak.includes("Dribbling")) plan += "Day 3: Cone dribbling\n\n";
  if(weak.includes("Passing")) plan += "Day 4: Wall passing\n\n";
  if(weak.includes("Speed")) plan += "Day 5: Sprint training\n\n";

  if(weak.length === 0) plan = "Maintain skills + play matches";

  let msg = weak.length === 0
    ? name + ", you are a strong player. Stay consistent."
    : name + ", improve weak areas daily to level up.";

  document.getElementById("out").style.display = "block";
  document.getElementById("weak").innerText = weak.join(", ") || "None";
  document.getElementById("plan").innerText = plan;
  document.getElementById("msg").innerText = msg;
}
</script>

</body>
</html>
